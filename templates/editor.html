<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑器 - Immersion Reader</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 导航栏（style.css 的导航样式） -->
    <nav class="navbar">
        <a class="navbar-brand" href="/">📖 Immersion Reader</a>
        <div class="navbar-links">
            <a href="/editor" class="active">✏️ 编辑器</a>
            <a href="/player">▶️ 播放器</a>
            <a href="/help">❓ 帮助</a>
        </div>
    </nav>
    <!-- 三栏编辑器主体（引用 style.css 的编辑器布局） -->
    <div class="editor-container">
        <!-- 左栏：元数据 -->
        <div class="editor-panel editor-panel-left">
            <h2>📋 作品信息</h2>
            <div class="form-group">
                <label>作品标题 *</label>
                <input type="text" id="meta-title" placeholder="输入作品标题">
            </div>
            <div class="form-group">
                <label>原文作者 *</label>
                <input type="text" id="meta-author" placeholder="输入原文作者">
            </div>
            <div class="form-group">
                <label>创作者 *</label>
                <input type="text" id="meta-creator" placeholder="输入创作者名称">
            </div>
            <div class="form-group">
                <label>作品简介</label>
                <textarea id="meta-desc" placeholder="简要描述作品内容…" rows="3"></textarea>
            </div>
            <div class="flex gap-1 mt-2">
                <button class="btn btn-primary btn-large" id="btn-save" style="flex:1;">💾 保存</button>
                <button class="btn btn-secondary btn-large" id="btn-open" style="flex:1;">📂 打开</button>
            </div>
            <p id="save-status" class="text-muted mt-1" style="font-size:0.8rem;"></p>
        </div>

        <!-- 中栏：段落编辑区 -->
        <div class="editor-panel editor-panel-center">
            <h2>📝 段落时间轴</h2>
            <div id="timeline-container"></div>
            <button class="btn btn-success mt-2" id="btn-add-segment" style="width:100%;">＋ 添加段落</button>
        </div>

        <!-- 右栏：资源区 -->
        <div class="editor-panel editor-panel-right">
            <div class="resource-section">
                <h2>🖼️ 可用图片</h2>
                <ul id="image-list" class="resource-list">
                    <li class="empty-state"><span class="empty-icon">📭</span><p>暂无图片</p></li>
                </ul>
                <input type="file" id="upload-image" accept="image/*" style="display:none;" onchange="uploadFile('image')">
                <button class="btn btn-secondary btn-small mt-1" style="width:100%;" onclick="document.getElementById('upload-image').click()">📤 上传图片</button>
            </div>
            <div class="resource-section">
                <h2>🎵 可用音频</h2>
                <ul id="audio-list" class="resource-list">
                    <li class="empty-state"><span class="empty-icon">📭</span><p>暂无音频</p></li>
                </ul>
                <input type="file" id="upload-audio" accept="audio/*" style="display:none;" onchange="uploadFile('audio')">
                <button class="btn btn-secondary btn-small mt-1" style="width:100%;" onclick="document.getElementById('upload-audio').click()">📤 上传音频</button>
            </div>
        </div>
    </div>

    <!-- 文件选择弹窗（使用 style.css 的弹窗样式） -->
    <div id="file-modal" class="modal-overlay hidden">
        <div class="modal-dialog" style="position:relative;">
            <button class="modal-close" onclick="closeFileModal()">✕</button>
            <h2>📂 打开作品</h2>
            <ul id="file-list" class="file-list">
                <li class="empty-state"><p>加载中...</p></li>
            </ul>
            <div class="flex flex-center mt-2">
                <button class="btn btn-secondary" onclick="closeFileModal()">取消</button>
            </div>
        </div>
    </div>

<script>
/* ===========================================
   编辑器核心脚本 v2.0 — 段落嵌套句子结构
   变更：删除起始时间/持续时间；入口复选框
   未选中时隐藏图片/音乐/效果控件；支持句子书写
   =========================================== */
let segments = [];
let projectImages = [];   // 当前项目的图片资源（非全局）
let projectAudios = [];   // 当前项目的音频资源（非全局）
let segmentCounter = 1;
const $ = id => document.getElementById(id);

function showToast(msg, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

// ========== 文件上传 ==========
async function uploadFile(type) {
    const input = document.getElementById('upload-' + type);
    const file = input.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    try {
        const r = await fetch('/api/upload', { method: 'POST', body: form });
        const d = await r.json();
        if (d.status === 'ok') {
            showToast('✅ 已上传: ' + d.filename, 'success');
            if (type === 'image') { projectImages.push(d.filename); renderImageList(); }
            else { projectAudios.push(d.filename); renderAudioList(); }
            renderTimeline();
        } else {
            showToast('上传失败: ' + (d.error || ''), 'error');
        }
    } catch(e) { showToast('上传失败: 网络错误', 'error'); }
    input.value = '';
}

async function loadAssets() {
    projectImages = [];
    projectAudios = [];
    renderImageList();
    renderAudioList();
}

function renderImageList() {
    const ul = $('image-list');
    if (!projectImages.length) { ul.innerHTML = '<li class="empty-state"><span class="empty-icon">📭</span><p>暂无图片</p></li>'; return; }
    ul.innerHTML = projectImages.map(f => '<li><span class="resource-name" title="'+f+'">🖼️ '+f+'</span></li>').join('');
}

function renderAudioList() {
    const ul = $('audio-list');
    if (!projectAudios.length) { ul.innerHTML = '<li class="empty-state"><span class="empty-icon">📭</span><p>暂无音频</p></li>'; return; }
    ul.innerHTML = projectAudios.map(f => '<li><span class="resource-name" title="'+f+'">🎵 '+f+'</span></li>').join('');
}

// ========== 复选框切换：立即保存编辑内容，切换入口状态，重新渲染 ==========
function toggleEntry(idx, el) {
    segments = collectSegmentsFromDOM();
    segments[idx].entry_point = el.checked;
    renderTimeline();
}

// ========== 创建段落数据（v2.0：无 start_time/duration，采用 sentences 数组） ==========
function createSegmentData(d) {
    d = d || {};
    return {
        segment_id: segmentCounter++,
        entry_point: d.entry_point !== undefined ? d.entry_point : true,
        background: d.background || (projectImages.length ? projectImages[0] : ''),
        background_music: d.background_music || '',
        transition_effect: d.transition_effect || 'cross_fade',
        sentences: d.sentences || [{id: 1, text: d.text || ''}]
    };
}

function addSegment(d) {
    segments = collectSegmentsFromDOM();
    segmentCounter = segments.length + 1;
    segments.push(createSegmentData(d || {}));
    renderTimeline();
}

function removeSegment(idx) {
    if (segments.length <= 1) { showToast('至少保留一个段落', 'error'); return; }
    segments.splice(idx, 1);
    segments.forEach((s,i) => s.segment_id = i+1);
    segmentCounter = segments.length + 1;
    renderTimeline();
}

// ========== 句子操作 ==========
function addSentence(segIdx) {
    segments = collectSegmentsFromDOM();
    const sents = segments[segIdx].sentences;
    const newId = sents.length ? Math.max(...sents.map(s => s.id)) + 1 : 1;
    sents.push({id: newId, text: ''});
    renderTimeline();
}

function removeSentence(segIdx, sentIdx) {
    segments = collectSegmentsFromDOM();
    const sents = segments[segIdx].sentences;
    if (sents.length <= 1) { showToast('每个段落至少保留一个句子', 'error'); return; }
    sents.splice(sentIdx, 1);
    renderTimeline();
}

// ========== 渲染时间轴 — 核心逻辑 ==========
function renderTimeline() {
    const c = $('timeline-container');
    if (!segments.length) { c.innerHTML = '<div class="empty-state"><span class="empty-icon">📝</span><p>点击下方按钮添加段落</p></div>'; return; }
    c.innerHTML = segments.map((seg,i) => {
        const isEntry = seg.entry_point !== false;
        const entryChecked = isEntry ? 'checked' : '';

        // 入口资源编辑区：仅当“入口”复选框选中时才显示
        let resourceHTML = '';
        if (isEntry) {
            const imgs = projectImages.map(f => '<option value="'+f+'"'+(seg.background===f?' selected':'')+'>'+f+'</option>').join('');
            const auds = '<option value="">-- 无 --</option>' + projectAudios.map(f => '<option value="'+f+'"'+(seg.background_music===f?' selected':'')+'>'+f+'</option>').join('');
            const effs = [{v:'cross_fade',l:'交叉淡入淡出'},{v:'fade_in',l:'淡入'},{v:'none',l:'无效果'}];
            const effOpts = effs.map(e => '<option value="'+e.v+'"'+(seg.transition_effect===e.v?' selected':'')+'>'+e.l+'</option>').join('');
            resourceHTML = '<div class="entry-resources">'
                + '<div class="form-row"><div class="form-group"><label>🖼️ 背景图</label><select class="seg-bg">'+imgs+'</select></div>'
                + '<div class="form-group"><label>🎵 背景音乐</label><select class="seg-music">'+auds+'</select></div></div>'
                + '<div class="form-group"><label>✨ 切换效果</label><select class="seg-effect">'+effOpts+'</select></div>'
                + '</div>';
        } else {
            resourceHTML = '<p class="inherit-hint">⬆️ 非入口段落，继承上一入口的图片和音乐设置</p>';
        }

        // 句子列表
        const sents = seg.sentences && seg.sentences.length ? seg.sentences : [{id:1, text:''}];
        let sentsHTML = '<div class="sentences-list">';
        sents.forEach((s, si) => {
            sentsHTML += '<div class="sentence-item" data-sent-index="'+si+'">'
                + '<span class="sentence-number">'+(si+1)+'.</span>'
                + '<textarea class="sent-text" rows="1" placeholder="输入句子文字…">'+escapeHtml(s.text||'')+'</textarea>'
                + '<button class="btn btn-danger btn-del-sent" onclick="removeSentence('+i+','+si+')" title="删除此句">✕</button>'
                + '</div>';
        });
        sentsHTML += '</div>';
        sentsHTML += '<button class="btn btn-secondary btn-add-sent" onclick="addSentence('+i+')" style="margin-top:6px;">＋ 添加句子</button>';

        return '<div class="segment-card" data-index="'+i+'">'
            + '<div class="segment-card-header">'
            + '<span class="segment-title">📌 段落 '+(i+1)+'</span>'
            + '<label class="entry-check-label"><input type="checkbox" class="seg-entry" '+entryChecked+' onchange="toggleEntry('+i+', this)"> 🔔 入口</label>'
            + '<button class="btn btn-danger btn-small" onclick="removeSegment('+i+')">✕ 删除</button>'
            + '</div>'
            + '<div class="segment-body">'
            + '<div class="form-group"><label>📝 本段句子（播放时每按一次显示一句）</label>' + sentsHTML + '</div>'
            + resourceHTML
            + '</div>'
            + '</div>';
    }).join('');
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ========== 从 DOM 收集段落数据（含句子嵌套） ==========
function collectSegmentsFromDOM() {
    const cards = document.querySelectorAll('.segment-card');
    const r = [];
    cards.forEach((card,i) => {
        const sentItems = card.querySelectorAll('.sentence-item');
        const sentences = [];
        sentItems.forEach((se, si) => {
            const ta = se.querySelector('.sent-text');
            sentences.push({id: si+1, text: ta ? ta.value.trim() : ''});
        });
        const entryChecked = card.querySelector('.seg-entry').checked;
        let bg = '', mu = '', eff = 'cross_fade';
        if (entryChecked) {
            const bgSel = card.querySelector('.seg-bg');
            const muSel = card.querySelector('.seg-music');
            const effSel = card.querySelector('.seg-effect');
            bg = bgSel ? bgSel.value : '';
            mu = muSel ? muSel.value : '';
            eff = effSel ? effSel.value : 'cross_fade';
        }
        r.push({
            segment_id: i+1,
            entry_point: entryChecked,
            background: bg,
            background_music: mu,
            transition_effect: eff,
            sentences: sentences
        });
    });
    return r;
}

// ========== 保存文件 ==========
async function saveFile() {
    const title = $('meta-title').value.trim(), author = $('meta-author').value.trim(), creator = $('meta-creator').value.trim();
    if (!title || !author || !creator) { showToast('请填写作品标题、原文作者和创作者','error'); return; }
    const tl = collectSegmentsFromDOM();
    if (!tl.length) { showToast('请至少添加一个段落','error'); return; }
    for (let i=0;i<tl.length;i++) {
        const sents = tl[i].sentences;
        if (!sents || !sents.length || !sents.some(s => s.text)) {
            showToast('段落'+(i+1)+'至少需要一个非空句子','error'); return;
        }
    }
    const imgAs={}, audAs={};
    tl.forEach(s=>{
        if(s.entry_point && s.background){
            const alias = s.background.replace(/\.[^.]+$/,'');
            imgAs[alias] = 'data/images/'+s.background;
            s.background = alias;
        }
        if(s.entry_point && s.background_music){
            const alias = s.background_music.replace(/\.[^.]+$/,'');
            audAs[alias] = 'data/audio/'+s.background_music;
            s.background_music = alias;
        }
    });
    const ims = {version:'1.1',metadata:{title,author,creator,description:$('meta-desc').value.trim()},assets:{images:imgAs,audios:audAs},timeline:tl};
    try {
        const r = await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ims)});
        const d = await r.json();
        if (d.status==='ok') { showToast('✅ 已保存: '+d.filename,'success'); $('save-status').textContent='最近保存: '+d.filename; }
        else showToast('保存失败: '+(d.error||'未知错误'),'error');
    } catch(e) { showToast('保存失败: 网络错误','error'); }
}

// ========== 文件打开弹窗 ==========
async function openFileModal() {
    const m=$('file-modal'),l=$('file-list'); m.classList.remove('hidden'); l.innerHTML='<li class="empty-state"><p>加载中...</p></li>';
    try {
        const files = await fetch('/api/files').then(r=>r.json());
        l.innerHTML = files.length ? files.map(f=>'<li onclick="loadFile(\''+escapeHtml(f)+'\')">📄 '+escapeHtml(f)+'</li>').join('') : '<li class="empty-state"><span class="empty-icon">📭</span><p>暂无可用作品</p></li>';
    } catch(e) { l.innerHTML='<li class="empty-state"><p>加载失败</p></li>'; }
}
function closeFileModal() { $('file-modal').classList.add('hidden'); }
$('file-modal').addEventListener('click',function(e){if(e.target===this)closeFileModal();});

// ========== 加载文件（兼容旧版 text 字段 → sentences） ==========
async function loadFile(fn) {
    try {
        const r = await fetch('/api/load?file='+encodeURIComponent(fn)); if(!r.ok){showToast('文件加载失败','error');return;}
        const d = await r.json();
        const m = d.metadata||{};
        $('meta-title').value=m.title||'';$('meta-author').value=m.author||'';$('meta-creator').value=m.creator||'';$('meta-desc').value=m.description||'';
        projectImages=[];projectAudios=[];
        if(d.assets){
            if(d.assets.images){
                Object.values(d.assets.images).forEach(p => {
                    const fn = p.replace(/\\/g,'/').split('/').pop();
                    if(fn && !projectImages.includes(fn)) projectImages.push(fn);
                });
            }
            if(d.assets.audios){
                Object.values(d.assets.audios).forEach(p => {
                    const fn = p.replace(/\\/g,'/').split('/').pop();
                    if(fn && !projectAudios.includes(fn)) projectAudios.push(fn);
                });
            }
        }
        renderImageList();renderAudioList();
        segments=[];segmentCounter=1;
        (d.timeline||[]).forEach(s=>{
            let bg='',mu='';
            if(s.entry_point !== false && s.background && d.assets && d.assets.images){
                const p=d.assets.images[s.background];
                if(p)bg=p.replace(/\\/g,'/').split('/').pop()||'';
            }
            if(s.entry_point !== false && s.background_music && d.assets && d.assets.audios){
                const p=d.assets.audios[s.background_music];
                if(p)mu=p.replace(/\\/g,'/').split('/').pop()||'';
            }
            let sentences = s.sentences;
            if (!sentences && s.text) { sentences = [{id: 1, text: s.text}]; }
            if (!sentences || !sentences.length) { sentences = [{id: 1, text: ''}]; }
            segments.push({
                segment_id: segmentCounter++,
                entry_point: s.entry_point !== false,
                background: bg,
                background_music: mu,
                transition_effect: s.transition_effect || 'cross_fade',
                sentences: sentences
            });
        });
        if(!segments.length) addSegment();
        renderTimeline();closeFileModal();showToast('✅ 已加载: '+fn,'success');
    } catch(e) { showToast('加载失败: 格式错误','error'); }
}

$('btn-save').addEventListener('click',saveFile);
$('btn-open').addEventListener('click',openFileModal);
$('btn-add-segment').addEventListener('click',function(){addSegment();});
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveFile();}});

async function init() { await loadAssets(); addSegment(); }
init();
</script>
</body>
</html>
