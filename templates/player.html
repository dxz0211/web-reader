<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放器 - Immersion Reader</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar">
    <a class="navbar-brand" href="/">📖 Immersion Reader</a>
    <div class="navbar-links">
        <a href="/editor">✏️ 编辑器</a>
        <a href="/player" class="active">▶️ 播放器</a>
        <a href="/help">❓ 帮助</a>
    </div>
</nav>

<!-- 全屏播放器容器（使用 style.css 的 .player-container） -->
<div id="player-container" class="player-container">
    <!-- 全屏背景图（同时保留 id 给 JS，添加 class 给 CSS） -->
    <div id="bg-image" class="player-background active"></div>

    <!-- 左上角元数据 -->
    <div id="info-bar" class="player-metadata">
        <div id="title-display" class="player-title"></div>
        <div id="author-display" class="player-author"></div>
    </div>

    <!-- 右上角进度 -->
    <div id="progress-text" class="player-progress">-/--</div>

    <!-- 中央文字覆盖层 -->
    <div id="text-overlay" class="player-text-overlay">
        <div id="text-box" class="player-text-box"></div>
    </div>

    <!-- 底部控制栏 -->
    <div id="controls" class="player-controls">
        <div class="file-select">
            <label>作品:</label>
            <select id="file-select"><option value="">-- 选择 --</option></select>
            <button id="load-btn" class="btn btn-primary btn-small">加载</button>
        </div>
        <button id="play-btn" class="btn btn-primary" disabled>▶ 播放</button>
        <button id="prev-btn" class="btn btn-secondary" disabled>◀ 上段</button>
        <button id="next-btn" class="btn btn-secondary" disabled>下段 ▶</button>
        <button id="start-btn" class="btn btn-secondary" disabled>⏮ 开头</button>
        <button id="save-btn" class="btn btn-secondary" disabled>💾 存档</button>
        <button id="loadsave-btn" class="btn btn-secondary" disabled>📂 读档</button>
        <button id="recall-btn" class="btn btn-secondary" disabled>📖 回想</button>
        <div class="volume-slider">
            <label>音量</label>
            <input type="range" id="volume-slider" min="0" max="100" value="70">
        </div>
    </div>
</div>

<div id="save-modal" class="modal-overlay hidden"><div class="modal-dialog">
    <button class="modal-close" onclick="closeModal('save-modal')">✕</button>
    <h2>💾 存档</h2>
    <div id="save-grid" class="slot-grid"></div>
</div></div>

<div id="load-modal" class="modal-overlay hidden"><div class="modal-dialog">
    <button class="modal-close" onclick="closeModal('load-modal')">✕</button>
    <h2>📂 读档</h2>
    <div id="load-grid" class="slot-grid"></div>
</div></div>

<script>
let imsData = null, curIdx = 0, isPlaying = false, timerId = null;
let startReal = null, pauseAccum = 0, pauseAt = null;
let audioEl = null, curAudioSrc = "";

const $ = id => document.getElementById(id);
const bgImg = $('bg-image'), txtOv = $('text-box');
const titleD = $('title-display'), authorD = $('author-display'), progTxt = $('progress-text');
const selFile = $('file-select'), playBtn = $('play-btn');
const nextBtn = $('next-btn'), prevBtn = $('prev-btn'), startBtn = $('start-btn');
const saveBtn = $('save-btn'), loadsaveBtn = $('loadsave-btn'), recallBtn = $('recall-btn');
const volSlider = $('volume-slider');
function enb(v) { [playBtn,nextBtn,prevBtn,startBtn,saveBtn,loadsaveBtn,recallBtn].forEach(b=>b.disabled=!v); }

async function loadFileList() {
    try {
        const r = await fetch('/api/files');
        const list = await r.json();
        selFile.innerHTML = '<option value="">-- 选择 --</option>';
        list.forEach(f => { const o = document.createElement('option'); o.value = f; o.textContent = f; selFile.appendChild(o); });
        // URL 参数自动加载
        const u = new URLSearchParams(location.search);
        if (u.get('file')) { selFile.value = u.get('file'); doLoad(); }
    } catch(e) {}
}
window.addEventListener('DOMContentLoaded', loadFileList);

$('load-btn').addEventListener('click', doLoad);

async function doLoad() {
    const fn = selFile.value;
    if (!fn) return alert('请选择文件');
    try {
        const r = await fetch('/api/load?file=' + encodeURIComponent(fn));
        if (!r.ok) return alert('加载失败');
        imsData = await r.json();
        curIdx = 0; isPlaying = false; stopTimer();
        if(audioEl){ audioEl.pause(); audioEl.src = ''; curAudioSrc = ''; }
        const m = imsData.metadata || {};
        titleD.textContent = m.title || '';
        authorD.textContent = m.author ? ('—— ' + m.author) : '';
        enb(true);
        showSeg(0);
        updProg();
        playBtn.textContent = '▶ 播放';
    } catch(e) { alert('加载失败'); }
}

let prevBgKey = null, prevMuKey = null;

function showSeg(idx) {
    if (!imsData || !imsData.timeline || idx < 0 || idx >= imsData.timeline.length) return;
    const seg = imsData.timeline[idx];
    txtOv.textContent = seg.text || '';
    
    // 背景图：只在变化时切换
    const bgKey = seg.background;
    if (bgKey !== prevBgKey && bgKey && imsData.assets && imsData.assets.images) {
        const p = imsData.assets.images[bgKey];
        if (p) {
            const url = '/' + p.replace(/\\/g, '/');
            bgImg.style.backgroundImage = 'url(' + url + ')';
            bgImg.classList.remove('active');
            void bgImg.offsetWidth;
            bgImg.classList.add('active');
        }
        prevBgKey = bgKey;
    }
    
    // 背景音乐：只在变化时切换
    const muKey = seg.background_music;
    if (muKey !== prevMuKey && muKey && imsData.assets && imsData.assets.audios) {
        const p = imsData.assets.audios[muKey];
        if (p && p !== curAudioSrc) {
            const url = '/' + p.replace(/\\/g, '/');
            if (!audioEl) { audioEl = new Audio(); audioEl.loop = true; }
            audioEl.src = url;
            audioEl.volume = volSlider.value / 100;
            if (isPlaying) audioEl.play().catch(()=>{});
            curAudioSrc = p;
        }
        prevMuKey = muKey;
    }
    curIdx = idx;
    updProg();
}

playBtn.addEventListener('click', togglePlay);
document.addEventListener('keydown', function(e) {
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowRight' && !nextBtn.disabled) { doNext(); }
    else if (e.key === 'ArrowLeft' && !prevBtn.disabled) { doPrev(); }
});

function togglePlay() {
    if (!imsData) return;
    if (isPlaying) { pause(); } else { resume(); }
}

function resume() {
    if (isPlaying) return;
    isPlaying = true;
    playBtn.textContent = '⏸';
    if (pauseAt !== null) { pauseAccum += (Date.now() - pauseAt) / 1000; pauseAt = null; }
    startReal = Date.now();
    if (audioEl && audioEl.src) audioEl.play().catch(()=>{});
    startTimer();
}

function pause() {
    if (!isPlaying) return;
    isPlaying = false;
    playBtn.textContent = '▶';
    stopTimer();
    pauseAt = Date.now();
    if (audioEl) audioEl.pause();
}

function startTimer() {
    stopTimer();
    timerId = setInterval(check, 200);
}

function stopTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

function check() {
    if (!imsData || !imsData.timeline || !isPlaying) return;
    const elapsed = (Date.now() - startReal) / 1000 - pauseAccum;
    const tl = imsData.timeline;
    let found = -1;
    for (let i = 0; i < tl.length; i++) {
        const s = tl[i];
        if (s.start_time <= elapsed && elapsed < s.start_time + s.duration) { found = i; break; }
    }
    if (found === -1) {
        if (elapsed >= tl[tl.length-1].start_time + tl[tl.length-1].duration) {
            pause();
            playBtn.textContent = '▶';
        }
        return;
    }
    if (found !== curIdx) showSeg(found);
}

function doNext() {
    if (!imsData || !imsData.timeline || curIdx >= imsData.timeline.length - 1) return;
    const nextSeg = imsData.timeline[curIdx + 1];
    showSeg(curIdx + 1);
    if (isPlaying) {
        const now = Date.now();
        startReal = now;
        pauseAccum = -nextSeg.start_time;
        pauseAt = null;
    }
}

function doPrev() {
    if (!imsData || !imsData.timeline || curIdx <= 0) return;
    const prevSeg = imsData.timeline[curIdx - 1];
    showSeg(curIdx - 1);
    if (isPlaying) {
        const now = Date.now();
        startReal = now;
        pauseAccum = -prevSeg.start_time;
        pauseAt = null;
    }
}

nextBtn.addEventListener('click', doNext);
prevBtn.addEventListener('click', doPrev);

startBtn.addEventListener('click', function() {
    if (!imsData) return;
    showSeg(0);
    if (isPlaying) { const now = Date.now(); startReal = now; pauseAccum = 0; pauseAt = null; }
});

function updProg() {
    if (!imsData || !imsData.timeline) { progTxt.textContent = '-/--'; return; }
    progTxt.textContent = (curIdx+1) + '/' + imsData.timeline.length;
}

volSlider.addEventListener('input', function() {
    if (audioEl) audioEl.volume = this.value / 100;
});

// 存档：保存按钮改为显示提示（存档/读档功能需先加载作品）
saveBtn.addEventListener('click', function() {
    if (!imsData) return;
    openSlotGrid('save-grid', 'save');
    $('save-modal').classList.remove('hidden');
});
loadsaveBtn.addEventListener('click', function() {
    if (!imsData) return;
    openSlotGrid('load-grid', 'load');
    $('load-modal').classList.remove('hidden');
});

function closeModal(id) { $(id).classList.add('hidden'); }

async function openSlotGrid(gridId, mode) {
    const grid = $(gridId);
    grid.innerHTML = '<p>加载中...</p>';
    const fn = selFile.value;
    if (!fn) { grid.innerHTML = '<p style="color:#e05555;">请先加载作品</p>'; return; }
    let list = [];
    try { const r = await fetch('/api/list_progress?filename=' + encodeURIComponent(fn)); list = await r.json(); } catch(e) {}
    grid.innerHTML = '';
    for (let s = 0; s < 10; s++) {
        const info = list[s];
        const el = document.createElement('div');
        el.className = 'slot-btn' + (info ? '' : ' empty');
        if (info) {
            el.innerHTML = `<strong>槽位 ${s+1}</strong><br>${info.filename||''}<br>第${(info.segment_index||0)+1}段<br><small>${info.timestamp||''}</small>`;
        } else {
            el.innerHTML = `<strong>槽位 ${s+1}</strong><br><span style="color:#666;">[空]</span>`;
        }
        el.addEventListener('click', function() {
            if (mode === 'save') {
                doSave(s);
            } else if (mode === 'load' && info) {
                doLoadSave(s, info);
            }
        });
        grid.appendChild(el);
    }
}

async function doSave(slot, info) {
    const fn = selFile.value;
    if (!fn) return alert('请先加载作品');
    try {
        const r = await fetch('/api/save_progress', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({slot, filename: fn, segment_index: curIdx})
        });
        const d = await r.json();
        if (d.status === 'ok') { alert('已保存到槽位 ' + (slot+1)); closeModal('save-modal'); }
        else alert('保存失败');
    } catch(e) { alert('保存失败'); }
}

async function doLoadSave(slot, info) {
    if (!info.filename) return alert('存档信息不完整');
    try {
        const r = await fetch('/api/load?file=' + encodeURIComponent(info.filename));
        if (!r.ok) return alert('作品文件不存在，读档失败');
        imsData = await r.json();
        const m = imsData.metadata || {};
        titleD.textContent = m.title || '';
        authorD.textContent = m.author ? ('—— ' + m.author) : '';
        let idx = (info.segment_index || 0);
        if (idx >= imsData.timeline.length) idx = 0;
        showSeg(idx);
        updProg();
        enb(true); isPlaying = false; stopTimer();
        playBtn.textContent = '▶';
        selFile.value = info.filename;
        closeModal('load-modal');
    } catch(e) { alert('读档失败'); }
}

// 回想
recallBtn.addEventListener('click', function() {
    if (!imsData || !imsData.timeline) return;
    let t = '=== 回想模式 ===\n\n';
    imsData.timeline.forEach((seg, i) => {
        const mk = (i === curIdx) ? ' ← 当前位置' : '';
        t += `段 ${i+1}: ${seg.text}${mk}\n`;
    });
    alert(t);
});

// 点击遮罩关闭弹窗（使用 style.css 的 .hidden 类）
['save-modal','load-modal'].forEach(id => {
    $(id).addEventListener('click', function(e) { if (e.target === this) closeModal(id); });
});
</script>
</body>
</html>
